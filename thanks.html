<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2YQX0BWRX0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-2YQX0BWRX0');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Lancashire Igloo Hire</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f4c75 0%, #3282b8 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .thank-you-content {
            max-width: 500px;
            animation: fadeInUp 0.8s ease;
        }
        .thank-you-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: bounce 1s ease infinite;
        }
        .thank-you-content h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }
        .thank-you-content p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            opacity: 0.95;
            line-height: 1.7;
        }
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 28px;
            background-color: #00b4d8;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-decoration: none;
        }
        .back-button:hover {
            background-color: #00d4ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .email-link {
            color: #00d4ff;
            font-weight: 600;
        }
        .email-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <section class="thank-you-section">
        <div class="thank-you-content">
            <div class="thank-you-icon">✓</div>
            <h1>Thank You!</h1>
            <p>Your enquiry has been received successfully.</p>
            <p>A member of our team will get back to you within 24 hours. We're excited to help make your event unforgettable!</p>
            <p>If you have any immediate questions, feel free to contact us at <a href="mailto:contact@lancashireigloohire.co.uk" class="email-link">contact@lancashireigloohire.co.uk</a></p>
            <a href="index.html" class="back-button">Return to Home</a>
        </div>
    </section>
</body>
</html>
