<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2YQX0BWRX0"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-2YQX0BWRX0');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Lancashire Igloo Hire</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f4c75 0%, #3282b8 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .error-content {
            max-width: 500px;
            animation: fadeInUp 0.8s ease;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1;
        }
        .error-content h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .error-content p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            opacity: 0.95;
            line-height: 1.7;
        }
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 28px;
            background-color: #00b4d8;
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-decoration: none;
        }
        .back-button:hover {
            background-color: #00d4ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <section class="error-section">
        <div class="error-content">
            <div class="error-code">❄️ 404</div>
            <h1>Page Not Found!</h1>
            <p>Oops! It seems the page you're looking for has melted away. Please check the URL or return to our homepage.</p>
            <a href="index.html" class="back-button">← Return to Home</a>
        </div>
    </section>
</body>
</html>
